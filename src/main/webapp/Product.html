<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product Calculator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #e3f2fd, #ffffff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        text-align: center;
        width: 350px;
    }

    h1 {
        color: #333;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
    }

    input:focus {
        border-color: #2196f3;
        outline: none;
    }

    button {
        width: 100%;
        padding: 10px;
        background-color: #2196f3;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #1976d2;
    }
</style>

</head>

<body>

<div class="container">
    <h1>Product Calculator</h1>

    <form action="multiply" method="get">
        <input type="number" name="n1" placeholder="Enter first number" required>
        <input type="number" name="n2" placeholder="Enter second number" required>
        <button type="submit">Calculate</button>
    </form>
</div>

</body>
</html>
